<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Photo Scan Deskewer Pro V4</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1e1e1e; color: #fff;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .toolbar {
            background: #2d2d2d; padding: 15px; border-radius: 8px;
            margin-bottom: 20px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); max-width: 95vw; justify-content: center;
        }
        .controls {
            display: flex; gap: 15px; align-items: center;
            border-left: 2px solid #444; border-right: 2px solid #444; padding: 0 15px;
        }
        .slider-group { display: flex; flex-direction: column; font-size: 0.8em; color: #bbb; min-width: 120px;}
        .slider-group span { display: flex; justify-content: space-between; margin-bottom: 4px; }
        button, input[type="file"]::file-selector-button {
            background: #0078d4; color: white; border: none;
            padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        button:hover, input[type="file"]::file-selector-button:hover { background: #005a9e; }
        button:disabled { background: #555; cursor: not-allowed; }
        
        #canvas-container {
            position: relative; border: 2px dashed #555; background: #000;
            max-width: 90vw; max-height: 60vh; overflow: hidden;
        }
        canvas { display: block; }
        
        #debug-container {
            display: flex; gap: 20px; margin-top: 20px; max-width: 90vw;
            overflow-x: auto; padding-bottom: 10px; justify-content: center;
        }
        .debug-box { display: flex; flex-direction: column; align-items: center; }
        .debug-box p { margin: 0 0 5px 0; font-size: 0.8em; color: #aaa; }
        .debug-canvas { max-height: 180px; border: 1px solid #444; background: #000; }
        
        #status { font-size: 0.9em; color: #aaa; min-width: 220px; }
    </style>
</head>
<body>

    <div class="toolbar">
        <span id="status">Loading OpenCV.js...</span>
        <input type="file" id="upload" accept="image/*" disabled>
        
        <div class="controls">
            <div class="slider-group">
                <span><label>Blur (Kill Noise)</label><output id="out-blur">15</output></span>
                <input type="range" id="cv-blur" min="1" max="51" step="2" value="15" disabled>
            </div>
            <div class="slider-group">
                <span><label>Edge Sens (Min)</label><output id="out-t1">30</output></span>
                <input type="range" id="cv-t1" min="10" max="150" value="30" disabled>
            </div>
            <div class="slider-group">
                <span><label>Edge Sens (Max)</label><output id="out-t2">100</output></span>
                <input type="range" id="cv-t2" min="50" max="250" value="100" disabled>
            </div>
            <div class="slider-group">
                <span><label>Edge Thickness</label><output id="out-dilate">3</output></span>
                <input type="range" id="cv-dilate" min="0" max="15" value="3" disabled>
            </div>
        </div>

        <button id="btn-extract" disabled>Crop & Download</button>
    </div>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div id="debug-container">
        <div class="debug-box">
            <p>1. Blurred Grayscale</p>
            <canvas id="debug-gray" class="debug-canvas"></canvas>
        </div>
        <div class="debug-box">
            <p>2. Canny + Dilate (Bot Vision)</p>
            <canvas id="debug-edges" class="debug-canvas"></canvas>
        </div>
    </div>

    <canvas id="hidden-canvas" style="display:none;"></canvas>

    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/piexifjs/1.0.6/piexif.min.js"></script>

    <script>
        let cvReady = false;
        let imgElement = new Image();
        let originalMat, displayMat;
        let scaleRatio = 1;
        
        let originalFileName = "scan";
        let savedExifData = null;
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const hiddenCanvas = document.getElementById('hidden-canvas');
        
        let points = [];
        let draggingPoint = -1, draggingEdge = -1;
        let dragOffsetX = 0, dragOffsetY = 0;

        function onOpenCvReady() {
            cvReady = true;
            document.getElementById('status').innerText = "Ready. Upload a scan.";
            document.getElementById('upload').disabled = false;
        }

        document.getElementById('upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const lastDot = file.name.lastIndexOf('.');
            originalFileName = lastDot === -1 ? file.name : file.name.substring(0, lastDot);

            const reader = new FileReader();
            reader.onload = (event) => {
                const dataURL = event.target.result;
                savedExifData = null;
                if (dataURL.startsWith("data:image/jpeg")) {
                    try { savedExifData = piexif.dump(piexif.load(dataURL)); } 
                    catch (err) { console.warn("Could not extract EXIF data."); }
                }
                imgElement.onload = () => { processImageLoad(); }
                imgElement.src = dataURL;
            };
            reader.readAsDataURL(file);
        });

        function processImageLoad() {
            if (originalMat) { originalMat.delete(); displayMat.delete(); }
            originalMat = cv.imread(imgElement);
            displayMat = new cv.Mat();
            
            const maxWidth = window.innerWidth * 0.8;
            const maxHeight = window.innerHeight * 0.60;
            scaleRatio = Math.min(maxWidth / originalMat.cols, maxHeight / originalMat.rows, 1);
            
            canvas.width = originalMat.cols * scaleRatio;
            canvas.height = originalMat.rows * scaleRatio;
            
            cv.resize(originalMat, displayMat, new cv.Size(canvas.width, canvas.height));
            
            ['cv-blur', 'cv-t1', 'cv-t2', 'cv-dilate', 'btn-extract'].forEach(id => {
                document.getElementById(id).disabled = false;
            });
            
            autoDetectCorners();
        }

        // Hook up sliders to update logic and outputs
        ['cv-blur', 'cv-t1', 'cv-t2', 'cv-dilate'].forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => {
                document.getElementById('out-' + id.split('-')[1]).innerText = e.target.value;
                autoDetectCorners();
            });
        });

        function autoDetectCorners() {
            if (!displayMat) return;
            
            let gray = new cv.Mat();
            let blur = new cv.Mat();
            let edges = new cv.Mat();
            let contours = new cv.MatVector();
            let hierarchy = new cv.Mat();

            let blurVal = parseInt(document.getElementById('cv-blur').value);
            let t1 = parseInt(document.getElementById('cv-t1').value);
            let t2 = parseInt(document.getElementById('cv-t2').value);
            let dilateVal = parseInt(document.getElementById('cv-dilate').value);

            // 1. Grayscale
            cv.cvtColor(displayMat, gray, cv.COLOR_RGBA2GRAY, 0);
            
            // 2. Heavy Blur to kill internal texture
            cv.GaussianBlur(gray, blur, new cv.Size(blurVal, blurVal), 0, 0, cv.BORDER_DEFAULT);
            cv.imshow('debug-gray', blur); // Show blurred version in debug

            // 3. Canny Edge Detection
            cv.Canny(blur, edges, t1, t2);

            // 4. Dilate to thicken edges and close gaps
            if (dilateVal > 0) {
                let M = cv.Mat.ones(dilateVal, dilateVal, cv.CV_8U);
                cv.dilate(edges, edges, M, new cv.Point(-1, -1), 1, cv.BORDER_CONSTANT, cv.morphologyDefaultBorderValue());
                M.delete();
            }

            cv.imshow('debug-edges', edges); // Show dilated edges

            // 5. Find Contours
            cv.findContours(edges, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

            let maxArea = 0;
            let bestPoints = null;

            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                if (area > (canvas.width * canvas.height * 0.05)) { 
                    let perimeter = cv.arcLength(cnt, true);
                    let approx = new cv.Mat();
                    cv.approxPolyDP(cnt, approx, 0.04 * perimeter, true); 
                    
                    if (approx.rows === 4 && area > maxArea) {
                        maxArea = area;
                        bestPoints = [];
                        for (let j = 0; j < 4; j++) {
                            bestPoints.push({ x: approx.data32S[j*2], y: approx.data32S[j*2+1] });
                        }
                    }
                    approx.delete();
                }
            }

            // Cleanup
            gray.delete(); blur.delete(); edges.delete(); contours.delete(); hierarchy.delete();

            if (bestPoints) {
                document.getElementById('status').innerText = "Auto-detected! Adjust corners if needed.";
                bestPoints.sort((a, b) => a.y - b.y); 
                let top = bestPoints.slice(0, 2).sort((a, b) => a.x - b.x); 
                let bottom = bestPoints.slice(2, 4).sort((a, b) => b.x - a.x); 
                points = [top[0], top[1], bottom[0], bottom[1]];
            } else {
                document.getElementById('status').innerText = "Auto-detect failed. Adjust sliders or drag manually.";
                const w = canvas.width, h = canvas.height;
                const inset = Math.min(w, h) * 0.1;
                points = [{x: inset, y: inset}, {x: w-inset, y: inset}, {x: w-inset, y: h-inset}, {x: inset, y: h-inset}];
            }
            
            draw();
        }

        function draw() {
            if (!displayMat) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'rgba(0, 120, 212, 0.2)';
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for(let i=1; i<4; i++) ctx.lineTo(points[i].x, points[i].y);
            ctx.closePath();
            ctx.fill();

            ctx.strokeStyle = '#0078d4';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = '#fff';
            points.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, 2 * Math.PI); ctx.fill(); ctx.stroke();
            });
        }

        function distToSegment(p, v, w) {
            const l2 = (v.x - w.x)**2 + (v.y - w.y)**2;
            if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const pos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            for (let i = 0; i < 4; i++) {
                if (Math.hypot(pos.x - points[i].x, pos.y - points[i].y) < 15) { draggingPoint = i; return; }
            }
            for (let i = 0; i < 4; i++) {
                if (distToSegment(pos, points[i], points[(i + 1) % 4]) < 10) {
                    draggingEdge = i; dragOffsetX = pos.x; dragOffsetY = pos.y; return;
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const pos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            
            if (draggingPoint !== -1) {
                points[draggingPoint] = pos; draw();
            } else if (draggingEdge !== -1) {
                const dx = pos.x - dragOffsetX; const dy = pos.y - dragOffsetY;
                points[draggingEdge].x += dx; points[draggingEdge].y += dy;
                points[(draggingEdge + 1) % 4].x += dx; points[(draggingEdge + 1) % 4].y += dy;
                dragOffsetX = pos.x; dragOffsetY = pos.y; draw();
            }
        });

        window.addEventListener('mouseup', () => { draggingPoint = -1; draggingEdge = -1; });

        document.getElementById('btn-extract').addEventListener('click', () => {
            if (!originalMat) return;
            
            const srcCoords = [];
            points.forEach(p => { srcCoords.push(p.x / scaleRatio, p.y / scaleRatio); });

            const w1 = Math.hypot(srcCoords[4] - srcCoords[6], srcCoords[5] - srcCoords[7]); 
            const w2 = Math.hypot(srcCoords[0] - srcCoords[2], srcCoords[1] - srcCoords[3]); 
            const h1 = Math.hypot(srcCoords[2] - srcCoords[4], srcCoords[3] - srcCoords[5]); 
            const h2 = Math.hypot(srcCoords[0] - srcCoords[6], srcCoords[1] - srcCoords[7]); 
            
            const maxWidth = Math.max(w1, w2);
            const maxHeight = Math.max(h1, h2);

            const dstCoords = [0, 0, maxWidth, 0, maxWidth, maxHeight, 0, maxHeight];

            let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, srcCoords);
            let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, dstCoords);
            let M = cv.getPerspectiveTransform(srcTri, dstTri);
            let warpedDst = new cv.Mat();
            let dsize = new cv.Size(maxWidth, maxHeight);

            cv.warpPerspective(originalMat, warpedDst, M, dsize, cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());
            cv.imshow('hidden-canvas', warpedDst);
            
            let dataURL = hiddenCanvas.toDataURL('image/jpeg', 0.95);
            if (savedExifData) {
                try { dataURL = piexif.insert(savedExifData, dataURL); } 
                catch (err) { console.warn("Failed to re-inject EXIF."); }
            }
            
            const a = document.createElement('a');
            a.href = dataURL; a.download = `${originalFileName}-fixed.jpg`; a.click();

            srcTri.delete(); dstTri.delete(); M.delete(); warpedDst.delete();
        });
    </script>
</body>
</html>
