<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClipSave</title>
    
    <meta name="theme-color" content="#2563eb">
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"Clipboard Saver","short_name":"ClipSave","start_url":".","display":"standalone","background_color":"#ffffff","theme_color":"#2563eb","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/2983/2983818.png","sizes":"192x192","type":"image/png"}]}'>

    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2983/2983818.png">

    <style>
        :root {
            --bg-color: #f4f4f5;
            --card-bg: #ffffff;
            --text-main: #18181b;
            --text-muted: #71717a;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --radius: 16px; /* Larger radius for mobile app feel */
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000; /* True black for OLED screens */
                --card-bg: #18181b;
                --text-main: #f4f4f5;
                --text-muted: #a1a1aa;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            /* Prevent pull-to-refresh on mobile to feel like an app */
            overscroll-behavior-y: contain; 
        }

        .container {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--radius);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        h1 { margin: 0; font-size: 1.25rem; font-weight: 700; }
        
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            border-radius: var(--radius);
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: scale(0.96); }

        .preview-area {
            border: 2px dashed var(--text-muted);
            border-radius: var(--radius);
            padding: 1rem;
            display: none;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            margin-top: 1rem;
        }
        .preview-area.active { display: flex; }

        .preview-media {
            max-width: 100%;
            max-height: 40vh; /* Dynamic height for mobile */
            border-radius: 8px;
            object-fit: contain;
            margin-bottom: 1rem;
        }

        .preview-text {
            background: var(--bg-color);
            padding: 1rem;
            border-radius: 8px;
            width: 100%;
            text-align: left;
            font-family: monospace;
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            word-break: break-all;
        }

        .meta-info { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem; }
        .error-msg { color: #ef4444; font-size: 0.9rem; margin-top: 0.5rem; display: none; }
        
        #downloadBtn { background-color: #10b981; }
    </style>
</head>
<body>

    <div class="container">
        <h1>ClipSave</h1>
        
        <button id="pasteBtn" class="btn">
            <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
            Paste from Clipboard
        </button>

        <div id="errorMsg" class="error-msg"></div>

        <div id="previewContainer" class="preview-area">
            <div class="meta-info" id="metaInfo"></div>
            <img id="imgPreview" class="preview-media" style="display:none">
            <div id="textPreview" class="preview-text" style="display:none"></div>
            
            <button id="downloadBtn" class="btn">
                <svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Save to Files
            </button>
        </div>
    </div>

    <script>
        const pasteBtn = document.getElementById('pasteBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const previewContainer = document.getElementById('previewContainer');
        const imgPreview = document.getElementById('imgPreview');
        const textPreview = document.getElementById('textPreview');
        const metaInfo = document.getElementById('metaInfo');
        const errorMsg = document.getElementById('errorMsg');

        let currentBlob = null;
        let currentExtension = '';

        pasteBtn.addEventListener('click', async () => {
            errorMsg.style.display = 'none';
            previewContainer.classList.remove('active');
            imgPreview.style.display = 'none';
            textPreview.style.display = 'none';
            
            try {
                const clipboardItems = await navigator.clipboard.read();
                if (clipboardItems.length === 0) throw new Error("Clipboard is empty.");

                const item = clipboardItems[0];
                const types = item.types;
                let blob = null;

                if (types.some(t => t.startsWith('image/'))) {
                    const imgType = types.find(t => t.startsWith('image/'));
                    blob = await item.getType(imgType);
                    currentExtension = imgType.split('/')[1];
                    const url = URL.createObjectURL(blob);
                    imgPreview.src = url;
                    imgPreview.style.display = 'block';
                } else if (types.includes('text/html')) {
                    blob = await item.getType('text/html');
                    currentExtension = 'html';
                    const text = await blob.text();
                    textPreview.textContent = text;
                    textPreview.style.display = 'block';
                } else if (types.includes('text/plain')) {
                    blob = await item.getType('text/plain');
                    currentExtension = 'txt';
                    const text = await blob.text();
                    textPreview.textContent = text;
                    textPreview.style.display = 'block';
                } else {
                    blob = await item.getType(types[0]);
                    currentExtension = 'bin';
                    textPreview.textContent = "Binary content.";
                    textPreview.style.display = 'block';
                }

                currentBlob = blob;
                metaInfo.textContent = `${blob.type.toUpperCase()} • ${(blob.size/1024).toFixed(1)} KB`;
                previewContainer.classList.add('active');

            } catch (err) {
                errorMsg.textContent = "Error: " + err.message;
                errorMsg.style.display = 'block';
                // Tip for user if they are on HTTP
                if (window.location.protocol === 'http:') {
                    errorMsg.textContent += " (HTTPS required)";
                }
            }
        });

        downloadBtn.addEventListener('click', () => {
            if (!currentBlob) return;
            const url = URL.createObjectURL(currentBlob);
            const a = document.createElement('a');
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
            a.href = url;
            a.download = `clip_${timestamp}.${currentExtension}`;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
        });
    </script>
</body>
</html>
