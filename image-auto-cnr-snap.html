<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Photo Scan Deskewer Pro V7</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1e1e1e; color: #fff;
            margin: 0; padding: 15px;
            height: 100vh; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center;
        }
        .toolbar {
            background: #2d2d2d; padding: 10px 15px; border-radius: 8px;
            margin-bottom: 15px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); width: 100%; box-sizing: border-box;
            flex-shrink: 0; justify-content: center;
        }
        .controls {
            display: flex; gap: 15px; align-items: center;
            border-left: 2px solid #444; border-right: 2px solid #444; padding: 0 15px;
        }
        .slider-group { display: flex; flex-direction: column; font-size: 0.8em; color: #bbb; min-width: 120px;}
        .slider-group span { display: flex; justify-content: space-between; margin-bottom: 4px; }
        
        button, input[type="file"]::file-selector-button {
            background: #0078d4; color: white; border: none;
            padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        button:hover, input[type="file"]::file-selector-button:hover { background: #005a9e; }
        button:disabled { background: #555; cursor: not-allowed; }
        #btn-snap { background: #107c10; width: 120px; }
        #btn-snap.off { background: #c50f1f; }
        
        .debug-container { display: flex; gap: 10px; align-items: center; }
        .debug-box { display: flex; flex-direction: column; align-items: center; }
        .debug-box p { margin: 0 0 2px 0; font-size: 0.7em; color: #aaa; }
        .debug-canvas { height: 60px; border: 1px solid #444; background: #000; cursor: crosshair;}
        
        #canvas-wrapper {
            flex-grow: 1; width: 100%; display: flex; justify-content: center; align-items: center;
            border: 2px dashed #555; background: #000; overflow: hidden; position: relative;
        }
        canvas { display: block; max-width: 100%; max-height: 100%; }
        
        #status { font-size: 0.9em; color: #aaa; min-width: 150px; }
    </style>
</head>
<body>

    <div class="toolbar">
        <span id="status">Loading OpenCV.js...</span>
        <input type="file" id="upload" accept="image/*" disabled>
        
        <div class="controls">
            <div class="slider-group">
                <span><label>Rail Sensitivity</label><output id="out-canny">50</output></span>
                <input type="range" id="cv-canny" min="10" max="150" value="50" disabled>
            </div>
            <div class="slider-group">
                <span><label>Min Line Length (%)</label><output id="out-length">25</output></span>
                <input type="range" id="cv-length" min="5" max="60" value="25" disabled>
            </div>
        </div>

        <button id="btn-snap" disabled>Snapping: ON</button>
        <button id="btn-extract" disabled>Crop & Download</button>

        <div class="debug-container">
            <div class="debug-box"><p>Canny Edges</p><canvas id="debug-edges" class="debug-canvas"></canvas></div>
            <div class="debug-box"><p>Magnetic Rails</p><canvas id="debug-lines" class="debug-canvas"></canvas></div>
        </div>
    </div>

    <div id="canvas-wrapper">
        <canvas id="canvas"></canvas>
    </div>

    <canvas id="hidden-canvas" style="display:none;"></canvas>

    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/piexifjs/1.0.6/piexif.min.js"></script>

    <script>
        let cvReady = false;
        let imgElement = new Image();
        let originalMat, displayMat;
        let scaleRatio = 1;
        
        let originalFileName = "scan";
        let savedExifData = null;
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const hiddenCanvas = document.getElementById('hidden-canvas');
        const canvasWrapper = document.getElementById('canvas-wrapper');
        
        let points = [];
        let magneticRails = [];
        let globalSnapEnabled = true;
        
        let draggingPoint = -1, draggingEdge = -1;
        let dragOffsetX = 0, dragOffsetY = 0;
        let dragStartPoints = [];
        let isSnapped = false;

        function onOpenCvReady() {
            cvReady = true;
            document.getElementById('status').innerText = "Ready. Upload a scan.";
            document.getElementById('upload').disabled = false;
        }

        document.getElementById('upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const lastDot = file.name.lastIndexOf('.');
            originalFileName = lastDot === -1 ? file.name : file.name.substring(0, lastDot);

            const reader = new FileReader();
            reader.onload = (event) => {
                const dataURL = event.target.result;
                savedExifData = null;
                if (dataURL.startsWith("data:image/jpeg")) {
                    try { savedExifData = piexif.dump(piexif.load(dataURL)); } catch(e){}
                }
                imgElement.onload = () => { processImageLoad(); }
                imgElement.src = dataURL;
            };
            reader.readAsDataURL(file);
        });

        function processImageLoad() {
            if (originalMat) { originalMat.delete(); displayMat.delete(); }
            originalMat = cv.imread(imgElement);
            displayMat = new cv.Mat();
            
            // Maximize canvas to fit the available wrapper space
            const maxWidth = canvasWrapper.clientWidth - 4;
            const maxHeight = canvasWrapper.clientHeight - 4;
            scaleRatio = Math.min(maxWidth / originalMat.cols, maxHeight / originalMat.rows, 1);
            
            canvas.width = originalMat.cols * scaleRatio;
            canvas.height = originalMat.rows * scaleRatio;
            
            cv.resize(originalMat, displayMat, new cv.Size(canvas.width, canvas.height));
            
            ['cv-canny', 'cv-length', 'btn-extract', 'btn-snap'].forEach(id => {
                document.getElementById(id).disabled = false;
            });
            
            const w = canvas.width, h = canvas.height;
            const ix = w * 0.15, iy = h * 0.15;
            points = [{x: ix, y: iy}, {x: w-ix, y: iy}, {x: w-ix, y: h-iy}, {x: ix, y: h-iy}];

            analyzeRails();
        }

        document.getElementById('btn-snap').addEventListener('click', (e) => {
            globalSnapEnabled = !globalSnapEnabled;
            e.target.innerText = globalSnapEnabled ? "Snapping: ON" : "Snapping: OFF";
            e.target.className = globalSnapEnabled ? "" : "off";
        });

        ['cv-canny', 'cv-length'].forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => {
                document.getElementById('out-' + id.split('-')[1]).innerText = e.target.value;
                analyzeRails();
            });
        });

        function analyzeRails() {
            if (!displayMat) return;
            
            let gray = new cv.Mat(), edges = new cv.Mat(), lines = new cv.Mat();
            magneticRails = [];

            let cannyVal = parseInt(document.getElementById('cv-canny').value);
            let minLineLength = canvas.width * (parseInt(document.getElementById('cv-length').value) / 100);

            cv.cvtColor(displayMat, gray, cv.COLOR_RGBA2GRAY, 0);
            cv.Canny(gray, edges, cannyVal, cannyVal * 2.5, 3);
            
            // Draw to debug with scaling
            let dEdges = new cv.Mat();
            cv.resize(edges, dEdges, new cv.Size(0,0), 60/edges.rows, 60/edges.rows);
            cv.imshow('debug-edges', dEdges);

            cv.HoughLinesP(edges, lines, 1, Math.PI / 180, 50, minLineLength, 20);

            let colorLines = new cv.Mat();
            cv.cvtColor(edges, colorLines, cv.COLOR_GRAY2RGBA);

            for (let i = 0; i < lines.rows; ++i) {
                let x1 = lines.data32S[i*4], y1 = lines.data32S[i*4+1];
                let x2 = lines.data32S[i*4+2], y2 = lines.data32S[i*4+3];
                let angle = Math.atan2(y2 - y1, x2 - x1);
                magneticRails.push({x1, y1, x2, y2, angle});
                cv.line(colorLines, new cv.Point(x1,y1), new cv.Point(x2,y2), new cv.Scalar(255,0,0,255), 2);
            }

            let dLines = new cv.Mat();
            cv.resize(colorLines, dLines, new cv.Size(0,0), 60/colorLines.rows, 60/colorLines.rows);
            cv.imshow('debug-lines', dLines);

            document.getElementById('status').innerText = `Found ${magneticRails.length} rails. Hold Shift to invert snap.`;

            gray.delete(); edges.delete(); lines.delete(); colorLines.delete(); dEdges.delete(); dLines.delete();
            draw();
        }

        // --- MATH: Line Intersections for Constraints ---
        function lineIntersection(A, B, C, D) {
            let a1 = B.y - A.y, b1 = A.x - B.x, c1 = a1 * A.x + b1 * A.y;
            let a2 = D.y - C.y, b2 = C.x - D.x, c2 = a2 * C.x + b2 * C.y;
            let det = a1 * b2 - a2 * b1;
            if (det === 0) return null; // Parallel
            return { x: (b2 * c1 - b1 * c2) / det, y: (a1 * c2 - a2 * c1) / det };
        }

        function findBestRail(rawA, rawB) {
            let edgeAngle = Math.atan2(rawB.y - rawA.y, rawB.x - rawA.x);
            let cx = (rawA.x + rawB.x) / 2, cy = (rawA.y + rawB.y) / 2;

            for (let rail of magneticRails) {
                let diff = Math.abs(rail.angle - edgeAngle) % Math.PI;
                diff = Math.min(diff, Math.PI - diff);
                
                if (diff < 0.15) { // ~8.5 degrees
                    let d = Math.abs((rail.y2 - rail.y1)*cx - (rail.x2 - rail.x1)*cy + rail.x2*rail.y1 - rail.y2*rail.x1) / 
                            Math.hypot(rail.y2 - rail.y1, rail.x2 - rail.x1);
                    if (d < 25) return rail; // Return the entire rail mathematically
                }
            }
            return null;
        }

        function distToSegment(p, v, w) {
            const l2 = (v.x - w.x)**2 + (v.y - w.y)**2;
            if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
        }

        function draw() {
            if (!displayMat) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(255, 0, 0, 0.3)'; ctx.lineWidth = 1;
            magneticRails.forEach(r => {
                ctx.beginPath(); ctx.moveTo(r.x1, r.y1); ctx.lineTo(r.x2, r.y2); ctx.stroke();
            });

            ctx.fillStyle = 'rgba(0, 120, 212, 0.2)';
            ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
            for(let i=1; i<4; i++) ctx.lineTo(points[i].x, points[i].y);
            ctx.closePath(); ctx.fill();

            for (let i=0; i<4; i++) {
                ctx.beginPath();
                ctx.moveTo(points[i].x, points[i].y);
                ctx.lineTo(points[(i+1)%4].x, points[(i+1)%4].y);
                if (isSnapped && draggingEdge === i) {
                    ctx.strokeStyle = '#00ff00'; ctx.lineWidth = 4;
                } else {
                    ctx.strokeStyle = '#0078d4'; ctx.lineWidth = 2;
                }
                ctx.stroke();
            }

            ctx.fillStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeStyle = '#0078d4';
            points.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, 2 * Math.PI); ctx.fill(); ctx.stroke(); });
        }

        // --- INTERACTION ---
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const pos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            
            for (let i = 0; i < 4; i++) {
                if (Math.hypot(pos.x - points[i].x, pos.y - points[i].y) < 15) { 
                    draggingPoint = i; return; 
                }
            }
            for (let i = 0; i < 4; i++) {
                if (distToSegment(pos, points[i], points[(i + 1) % 4]) < 10) {
                    draggingEdge = i; 
                    dragOffsetX = pos.x; dragOffsetY = pos.y; 
                    // Deep copy current points to act as static geometry rails for intersections
                    dragStartPoints = JSON.parse(JSON.stringify(points));
                    return;
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const pos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            
            if (draggingPoint !== -1) { 
                // Corner dragging is completely free, no snapping, no angle constraints
                points[draggingPoint] = pos; 
                isSnapped = false;
                draw(); 
            } else if (draggingEdge !== -1) {
                let i = draggingEdge;
                let dx = pos.x - dragOffsetX; 
                let dy = pos.y - dragOffsetY;
                
                // Get the invariant adjacent lines
                let pPrev = dragStartPoints[(i + 3) % 4];
                let p1 = dragStartPoints[i];
                let p2 = dragStartPoints[(i + 1) % 4];
                let pNext = dragStartPoints[(i + 2) % 4];

                // Our proposed translated line
                let targetLineP1 = {x: p1.x + dx, y: p1.y + dy};
                let targetLineP2 = {x: p2.x + dx, y: p2.y + dy};
                
                // Shift key temporarily inverts the snapping behavior
                let effectiveSnap = globalSnapEnabled !== e.shiftKey;
                isSnapped = false;

                if (effectiveSnap) {
                    let snapRail = findBestRail(targetLineP1, targetLineP2);
                    if (snapRail) {
                        targetLineP1 = {x: snapRail.x1, y: snapRail.y1};
                        targetLineP2 = {x: snapRail.x2, y: snapRail.y2};
                        isSnapped = true;
                    }
                }

                // Math Magic: Slide corners along the infinite lines of the adjacent edges
                let newP1 = lineIntersection(pPrev, p1, targetLineP1, targetLineP2);
                let newP2 = lineIntersection(p2, pNext, targetLineP1, targetLineP2);

                if (newP1 && newP2) {
                    points[i] = newP1;
                    points[(i + 1) % 4] = newP2;
                }
                draw();
            } else {
                let cursor = 'crosshair';
                for (let i=0; i<4; i++) {
                    if (distToSegment(pos, points[i], points[(i+1)%4]) < 10) cursor = 'move';
                    if (Math.hypot(pos.x - points[i].x, pos.y - points[i].y) < 15) cursor = 'pointer';
                }
                canvas.style.cursor = cursor;
            }
        });

        window.addEventListener('mouseup', () => { draggingPoint = -1; draggingEdge = -1; isSnapped = false; draw(); });

        document.getElementById('btn-extract').addEventListener('click', () => {
            if (!originalMat) return;
            const srcCoords = [];
            points.forEach(p => { srcCoords.push(p.x / scaleRatio, p.y / scaleRatio); });

            const w1 = Math.hypot(srcCoords[4] - srcCoords[6], srcCoords[5] - srcCoords[7]); 
            const w2 = Math.hypot(srcCoords[0] - srcCoords[2], srcCoords[1] - srcCoords[3]); 
            const h1 = Math.hypot(srcCoords[2] - srcCoords[4], srcCoords[3] - srcCoords[5]); 
            const h2 = Math.hypot(srcCoords[0] - srcCoords[6], srcCoords[1] - srcCoords[7]); 
            const maxWidth = Math.max(w1, w2); const maxHeight = Math.max(h1, h2);

            let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, srcCoords);
            let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, [0, 0, maxWidth, 0, maxWidth, maxHeight, 0, maxHeight]);
            let M = cv.getPerspectiveTransform(srcTri, dstTri);
            let warpedDst = new cv.Mat();
            
            cv.warpPerspective(originalMat, warpedDst, M, new cv.Size(maxWidth, maxHeight), cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());
            cv.imshow('hidden-canvas', warpedDst);
            
            let dataURL = hiddenCanvas.toDataURL('image/jpeg', 0.95);
            if (savedExifData) { try { dataURL = piexif.insert(savedExifData, dataURL); } catch(e){} }
            
            const a = document.createElement('a');
            a.href = dataURL; a.download = `${originalFileName}-fixed.jpg`; a.click();
            srcTri.delete(); dstTri.delete(); M.delete(); warpedDst.delete();
        });
    </script>
</body>
</html>
