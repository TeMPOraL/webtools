<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Photo Scan Deskewer Pro V6</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1e1e1e; color: #fff;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .toolbar {
            background: #2d2d2d; padding: 15px; border-radius: 8px;
            margin-bottom: 20px; display: flex; gap: 15px; align-items: center; flex-wrap: wrap;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); max-width: 95vw; justify-content: center;
        }
        .controls {
            display: flex; gap: 15px; align-items: center;
            border-left: 2px solid #444; border-right: 2px solid #444; padding: 0 15px;
        }
        .slider-group { display: flex; flex-direction: column; font-size: 0.8em; color: #bbb; min-width: 140px;}
        .slider-group span { display: flex; justify-content: space-between; margin-bottom: 4px; }
        button, input[type="file"]::file-selector-button {
            background: #0078d4; color: white; border: none;
            padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        button:hover, input[type="file"]::file-selector-button:hover { background: #005a9e; }
        button:disabled { background: #555; cursor: not-allowed; }
        
        #canvas-container {
            position: relative; border: 2px dashed #555; background: #000;
            max-width: 90vw; max-height: 55vh; overflow: hidden; cursor: crosshair;
        }
        canvas { display: block; }
        
        #debug-container {
            display: flex; gap: 20px; margin-top: 20px; max-width: 90vw;
            overflow-x: auto; padding-bottom: 10px; justify-content: center;
        }
        .debug-box { display: flex; flex-direction: column; align-items: center; }
        .debug-box p { margin: 0 0 5px 0; font-size: 0.8em; color: #aaa; }
        .debug-canvas { max-height: 180px; border: 1px solid #444; background: #000; }
        
        #status { font-size: 0.9em; color: #aaa; min-width: 250px; }
    </style>
</head>
<body>

    <div class="toolbar">
        <span id="status">Loading OpenCV.js...</span>
        <input type="file" id="upload" accept="image/*" disabled>
        
        <div class="controls">
            <div class="slider-group">
                <span><label>Rail Sensitivity</label><output id="out-canny">50</output></span>
                <input type="range" id="cv-canny" min="10" max="150" value="50" disabled title="Lower detects fainter lines">
            </div>
            <div class="slider-group">
                <span><label>Min Line Length (%)</label><output id="out-length">25</output></span>
                <input type="range" id="cv-length" min="5" max="60" value="25" disabled title="Filters out short noise like grass">
            </div>
        </div>

        <button id="btn-extract" disabled>Crop & Download</button>
    </div>

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div id="debug-container">
        <div class="debug-box">
            <p>1. Canny Edges (Raw)</p>
            <canvas id="debug-edges" class="debug-canvas"></canvas>
        </div>
        <div class="debug-box">
            <p>2. Magnetic Rails (Filtered Lines)</p>
            <canvas id="debug-lines" class="debug-canvas"></canvas>
        </div>
    </div>

    <canvas id="hidden-canvas" style="display:none;"></canvas>

    <script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onOpenCvReady();"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/piexifjs/1.0.6/piexif.min.js"></script>

    <script>
        let cvReady = false;
        let imgElement = new Image();
        let originalMat, displayMat;
        let scaleRatio = 1;
        
        let originalFileName = "scan";
        let savedExifData = null;
        
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const hiddenCanvas = document.getElementById('hidden-canvas');
        
        let points = [];
        let magneticRails = []; // Stores {x1, y1, x2, y2, angle}
        
        // Interaction states
        let draggingPoint = -1, draggingEdge = -1;
        let dragOffsetX = 0, dragOffsetY = 0;
        let dragStartP1 = {x:0, y:0}, dragStartP2 = {x:0, y:0};
        let isSnapped = false;

        function onOpenCvReady() {
            cvReady = true;
            document.getElementById('status').innerText = "Ready. Upload a scan.";
            document.getElementById('upload').disabled = false;
        }

        document.getElementById('upload').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const lastDot = file.name.lastIndexOf('.');
            originalFileName = lastDot === -1 ? file.name : file.name.substring(0, lastDot);

            const reader = new FileReader();
            reader.onload = (event) => {
                const dataURL = event.target.result;
                savedExifData = null;
                if (dataURL.startsWith("data:image/jpeg")) {
                    try { savedExifData = piexif.dump(piexif.load(dataURL)); } 
                    catch (err) { console.warn("Could not extract EXIF data."); }
                }
                imgElement.onload = () => { processImageLoad(); }
                imgElement.src = dataURL;
            };
            reader.readAsDataURL(file);
        });

        function processImageLoad() {
            if (originalMat) { originalMat.delete(); displayMat.delete(); }
            originalMat = cv.imread(imgElement);
            displayMat = new cv.Mat();
            
            const maxWidth = window.innerWidth * 0.8;
            const maxHeight = window.innerHeight * 0.55;
            scaleRatio = Math.min(maxWidth / originalMat.cols, maxHeight / originalMat.rows, 1);
            
            canvas.width = originalMat.cols * scaleRatio;
            canvas.height = originalMat.rows * scaleRatio;
            
            cv.resize(originalMat, displayMat, new cv.Size(canvas.width, canvas.height));
            
            ['cv-canny', 'cv-length', 'btn-extract'].forEach(id => {
                document.getElementById(id).disabled = false;
            });
            
            // Set initial safe bounding box (inset by 15% to guarantee it's inside the photo)
            const w = canvas.width, h = canvas.height;
            const insetX = w * 0.15;
            const insetY = h * 0.15;
            points = [
                {x: insetX, y: insetY}, 
                {x: w-insetX, y: insetY}, 
                {x: w-insetX, y: h-insetY}, 
                {x: insetX, y: h-insetY}
            ];

            analyzeRails();
        }

        ['cv-canny', 'cv-length'].forEach(id => {
            document.getElementById(id).addEventListener('input', (e) => {
                document.getElementById('out-' + id.split('-')[1]).innerText = e.target.value;
                analyzeRails();
            });
        });

        function analyzeRails() {
            if (!displayMat) return;
            
            let gray = new cv.Mat();
            let edges = new cv.Mat();
            let lines = new cv.Mat();
            magneticRails = [];

            let cannyVal = parseInt(document.getElementById('cv-canny').value);
            let lengthPct = parseInt(document.getElementById('cv-length').value) / 100;
            let minLineLength = canvas.width * lengthPct;

            // 1. Grayscale & Edge Detection
            cv.cvtColor(displayMat, gray, cv.COLOR_RGBA2GRAY, 0);
            cv.Canny(gray, edges, cannyVal, cannyVal * 2.5, 3);
            cv.imshow('debug-edges', edges);

            // 2. Probabilistic Hough Transform to find rails
            // cv.HoughLinesP(image, lines, rho, theta, threshold, minLineLength, maxLineGap)
            cv.HoughLinesP(edges, lines, 1, Math.PI / 180, 50, minLineLength, 20);

            // Create a color mat to visualize lines in debug view
            let colorLines = new cv.Mat();
            cv.cvtColor(edges, colorLines, cv.COLOR_GRAY2RGBA);

            for (let i = 0; i < lines.rows; ++i) {
                let x1 = lines.data32S[i * 4];
                let y1 = lines.data32S[i * 4 + 1];
                let x2 = lines.data32S[i * 4 + 2];
                let y2 = lines.data32S[i * 4 + 3];
                
                let angle = Math.atan2(y2 - y1, x2 - x1);
                magneticRails.push({x1, y1, x2, y2, angle});

                // Draw line in red on debug canvas
                let p1 = new cv.Point(x1, y1);
                let p2 = new cv.Point(x2, y2);
                cv.line(colorLines, p1, p2, new cv.Scalar(255, 0, 0, 255), 2);
            }

            cv.imshow('debug-lines', colorLines);
            document.getElementById('status').innerText = `Found ${magneticRails.length} magnetic rails. Drag edges outward to snap.`;

            gray.delete(); edges.delete(); lines.delete(); colorLines.delete();
            draw();
        }

        // --- MATH HELPERS ---
        function distToSegment(p, v, w) {
            const l2 = (v.x - w.x)**2 + (v.y - w.y)**2;
            if (l2 === 0) return Math.hypot(p.x - v.x, p.y - v.y);
            let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
        }

        function projectPointOntoLine(p, lineP1, lineP2) {
            const l2 = (lineP2.x - lineP1.x)**2 + (lineP2.y - lineP1.y)**2;
            if (l2 === 0) return { x: p.x, y: p.y };
            const t = ((p.x - lineP1.x) * (lineP2.x - lineP1.x) + (p.y - lineP1.y) * (lineP2.y - lineP1.y)) / l2;
            return {
                x: lineP1.x + t * (lineP2.x - lineP1.x),
                y: lineP1.y + t * (lineP2.y - lineP1.y)
            };
        }

        // Check if an edge should snap to a rail
        function calculateSnap(rawA, rawB) {
            let edgeAngle = Math.atan2(rawB.y - rawA.y, rawB.x - rawA.x);
            let cx = (rawA.x + rawB.x) / 2;
            let cy = (rawA.y + rawB.y) / 2;

            for (let rail of magneticRails) {
                // Angle Difference (handling pi wrapping)
                let diff = Math.abs(rail.angle - edgeAngle) % Math.PI;
                diff = Math.min(diff, Math.PI - diff);
                
                // If angle is within ~8.5 degrees (0.15 rad)
                if (diff < 0.15) {
                    // Orthogonal distance from center of dragged edge to rail
                    let d = Math.abs((rail.y2 - rail.y1)*cx - (rail.x2 - rail.x1)*cy + rail.x2*rail.y1 - rail.y2*rail.x1) / 
                            Math.hypot(rail.y2 - rail.y1, rail.x2 - rail.x1);
                    
                    // If within 25 pixels
                    if (d < 25) {
                        let lineP1 = {x: rail.x1, y: rail.y1};
                        let lineP2 = {x: rail.x2, y: rail.y2};
                        return {
                            A: projectPointOntoLine(rawA, lineP1, lineP2),
                            B: projectPointOntoLine(rawB, lineP1, lineP2)
                        };
                    }
                }
            }
            return null;
        }

        function draw() {
            if (!displayMat) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(imgElement, 0, 0, canvas.width, canvas.height);

            // Draw faint magnetic rails on main canvas
            ctx.strokeStyle = 'rgba(255, 0, 0, 0.3)';
            ctx.lineWidth = 1;
            magneticRails.forEach(r => {
                ctx.beginPath(); ctx.moveTo(r.x1, r.y1); ctx.lineTo(r.x2, r.y2); ctx.stroke();
            });

            // Draw Quadrilateral Area
            ctx.fillStyle = 'rgba(0, 120, 212, 0.2)';
            ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
            for(let i=1; i<4; i++) ctx.lineTo(points[i].x, points[i].y);
            ctx.closePath(); ctx.fill();

            // Draw Edges
            for (let i=0; i<4; i++) {
                ctx.beginPath();
                ctx.moveTo(points[i].x, points[i].y);
                ctx.lineTo(points[(i+1)%4].x, points[(i+1)%4].y);
                
                // Highlight edge green if actively snapped
                if (isSnapped && draggingEdge === i) {
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 4;
                } else {
                    ctx.strokeStyle = '#0078d4';
                    ctx.lineWidth = 2;
                }
                ctx.stroke();
            }

            // Draw Corners
            ctx.fillStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#0078d4';
            points.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, 2 * Math.PI); ctx.fill(); ctx.stroke(); });
        }

        // --- INTERACTION ---
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const pos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            
            // Check points
            for (let i = 0; i < 4; i++) {
                if (Math.hypot(pos.x - points[i].x, pos.y - points[i].y) < 15) { 
                    draggingPoint = i; return; 
                }
            }
            // Check edges
            for (let i = 0; i < 4; i++) {
                if (distToSegment(pos, points[i], points[(i + 1) % 4]) < 10) {
                    draggingEdge = i; 
                    dragOffsetX = pos.x; dragOffsetY = pos.y; 
                    // Store initial geometry so we don't warp it during projection tests
                    dragStartP1 = {x: points[i].x, y: points[i].y};
                    dragStartP2 = {x: points[(i+1)%4].x, y: points[(i+1)%4].y};
                    return;
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const pos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            
            if (draggingPoint !== -1) { 
                points[draggingPoint] = pos; 
                isSnapped = false;
                draw(); 
            } else if (draggingEdge !== -1) {
                const dx = pos.x - dragOffsetX; 
                const dy = pos.y - dragOffsetY;
                
                let rawA = {x: dragStartP1.x + dx, y: dragStartP1.y + dy};
                let rawB = {x: dragStartP2.x + dx, y: dragStartP2.y + dy};
                
                let snapResult = calculateSnap(rawA, rawB);
                
                if (snapResult) {
                    points[draggingEdge] = snapResult.A;
                    points[(draggingEdge + 1) % 4] = snapResult.B;
                    isSnapped = true;
                } else {
                    points[draggingEdge] = rawA;
                    points[(draggingEdge + 1) % 4] = rawB;
                    isSnapped = false;
                }
                draw();
            } else {
                // Update cursor
                let cursor = 'crosshair';
                for (let i=0; i<4; i++) {
                    if (distToSegment(pos, points[i], points[(i+1)%4]) < 10) cursor = 'move';
                    if (Math.hypot(pos.x - points[i].x, pos.y - points[i].y) < 15) cursor = 'pointer';
                }
                canvas.style.cursor = cursor;
            }
        });

        window.addEventListener('mouseup', () => { 
            draggingPoint = -1; 
            draggingEdge = -1; 
            isSnapped = false;
            draw();
        });

        // --- EXTRACTION ---
        document.getElementById('btn-extract').addEventListener('click', () => {
            if (!originalMat) return;
            const srcCoords = [];
            points.forEach(p => { srcCoords.push(p.x / scaleRatio, p.y / scaleRatio); });

            const w1 = Math.hypot(srcCoords[4] - srcCoords[6], srcCoords[5] - srcCoords[7]); 
            const w2 = Math.hypot(srcCoords[0] - srcCoords[2], srcCoords[1] - srcCoords[3]); 
            const h1 = Math.hypot(srcCoords[2] - srcCoords[4], srcCoords[3] - srcCoords[5]); 
            const h2 = Math.hypot(srcCoords[0] - srcCoords[6], srcCoords[1] - srcCoords[7]); 
            const maxWidth = Math.max(w1, w2); const maxHeight = Math.max(h1, h2);

            const dstCoords = [0, 0, maxWidth, 0, maxWidth, maxHeight, 0, maxHeight];

            let srcTri = cv.matFromArray(4, 1, cv.CV_32FC2, srcCoords);
            let dstTri = cv.matFromArray(4, 1, cv.CV_32FC2, dstCoords);
            let M = cv.getPerspectiveTransform(srcTri, dstTri);
            let warpedDst = new cv.Mat();
            let dsize = new cv.Size(maxWidth, maxHeight);

            cv.warpPerspective(originalMat, warpedDst, M, dsize, cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());
            cv.imshow('hidden-canvas', warpedDst);
            
            let dataURL = hiddenCanvas.toDataURL('image/jpeg', 0.95);
            if (savedExifData) {
                try { dataURL = piexif.insert(savedExifData, dataURL); } 
                catch (err) { console.warn("Failed to re-inject EXIF."); }
            }
            
            const a = document.createElement('a');
            a.href = dataURL; a.download = `${originalFileName}-fixed.jpg`; a.click();
            srcTri.delete(); dstTri.delete(); M.delete(); warpedDst.delete();
        });
    </script>
</body>
</html>
