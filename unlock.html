<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Unlocker</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --error: #ef4444;
            --success: #10b981;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 2.5rem 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 1.5rem;
            background-color: rgba(0,0,0,0.1);
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--primary);
            background-color: rgba(59, 130, 246, 0.05);
        }

        .drop-zone p {
            margin: 0;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .file-name {
            color: var(--primary);
            font-weight: 600;
            margin-top: 0.5rem;
            word-break: break-all;
            display: block;
        }

        input[type="file"] {
            display: none;
        }

        .input-group {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background-color: var(--bg);
            color: var(--text);
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="password"]:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            border-radius: 6px;
            border: none;
            background-color: var(--primary);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: var(--border);
            cursor: not-allowed;
            color: var(--text-muted);
        }

        .status {
            margin-top: 1rem;
            font-size: 0.9rem;
            min-height: 1.2rem;
            font-weight: 500;
        }

        .status.error { color: var(--error); }
        .status.success { color: var(--success); }
        .status.processing { color: var(--primary); }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@zip.js/zip.js@2.4.26/dist/zip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@cantoo/pdf-lib@2.6.3/dist/pdf-lib.min.js"></script>
</head>
<body>

<div class="container">
    <h1>Remove Protection</h1>
    <p class="subtitle">100% Client-Side. Files never leave your device.</p>

    <div class="drop-zone" id="dropZone">
        <p>Drop a PDF or ZIP file here<br>or click to browse</p>
        <span class="file-name" id="fileName"></span>
    </div>
    <input type="file" id="fileInput" accept=".pdf,.zip,application/pdf,application/zip,application/x-zip-compressed">

    <div class="input-group">
        <label for="password">Document Password</label>
        <input type="password" id="password" placeholder="Enter the current password">
    </div>

    <button id="actionBtn" disabled>Unlock & Download</button>
    <div class="status" id="status"></div>
</div>

<script>
    // Grab the global instances loaded by the script tags
    const { PDFDocument } = window.PDFLib;
    
    // Disable Web Workers to prevent cross-origin hiccups on static hosts
    zip.configure({
        useWebWorkers: false
    });

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileNameDisplay = document.getElementById('fileName');
    const passwordInput = document.getElementById('password');
    const actionBtn = document.getElementById('actionBtn');
    const statusText = document.getElementById('status');

    let currentFile = null;

    dropZone.addEventListener('click', () => fileInput.click());
    
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
            handleFileSelect(e.dataTransfer.files[0]);
        }
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) {
            handleFileSelect(e.target.files[0]);
        }
    });

    passwordInput.addEventListener('input', updateButtonState);
    actionBtn.addEventListener('click', processFile);

    function handleFileSelect(file) {
        const isPdf = file.name.toLowerCase().endsWith('.pdf') || file.type === 'application/pdf';
        const isZip = file.name.toLowerCase().endsWith('.zip') || file.type.includes('zip');

        if (!isPdf && !isZip) {
            setStatus('Unsupported file type. Please select a PDF or ZIP.', 'error');
            currentFile = null;
            fileNameDisplay.textContent = '';
            updateButtonState();
            return;
        }

        currentFile = file;
        fileNameDisplay.textContent = file.name;
        setStatus('', '');
        updateButtonState();
    }

    function updateButtonState() {
        actionBtn.disabled = !currentFile || !passwordInput.value.trim();
    }

    function setStatus(message, type) {
        statusText.textContent = message;
        statusText.className = `status ${type}`;
    }

    async function processFile() {
        if (!currentFile || !passwordInput.value) return;

        const password = passwordInput.value;
        const isPdf = currentFile.name.toLowerCase().endsWith('.pdf');
        
        setStatus('Processing...', 'processing');
        actionBtn.disabled = true;

        try {
            let resultBlob;
            if (isPdf) {
                resultBlob = await unlockPdf(currentFile, password);
            } else {
                resultBlob = await unlockZip(currentFile, password);
            }

            downloadFile(resultBlob, `unlocked_${currentFile.name}`);
            setStatus('Success! File downloaded.', 'success');
            passwordInput.value = ''; 
        } catch (error) {
            console.error(error);
            setStatus(`Error: ${error.message || 'Processing failed'}`, 'error');
        } finally {
            updateButtonState();
        }
    }

    async function unlockPdf(file, password) {
        const arrayBuffer = await file.arrayBuffer();
        let pdfDoc;
        
        try {
            pdfDoc = await PDFDocument.load(arrayBuffer, { password, ignoreEncryption: false });
        } catch (e) {
            throw new Error('Incorrect password or unable to read PDF structure.');
        }

        const savedBytes = await pdfDoc.save();
        return new Blob([savedBytes], { type: 'application/pdf' });
    }

    async function unlockZip(file, password) {
        const zipFileReader = new zip.BlobReader(file);
        let zipReader;
        let entries;

        try {
            zipReader = new zip.ZipReader(zipFileReader, { password });
            entries = await zipReader.getEntries();
        } catch (e) {
            throw new Error('Failed to read ZIP. Format might be corrupted.');
        }

        const zipFileWriter = new zip.BlobWriter();
        const zipWriter = new zip.ZipWriter(zipFileWriter);

        for (const entry of entries) {
            if (entry.directory) {
                await zipWriter.add(entry.filename, null, { directory: true });
            } else {
                try {
                    const unencryptedBlob = await entry.getData(new zip.BlobWriter());
                    await zipWriter.add(entry.filename, new zip.BlobReader(unencryptedBlob));
                } catch (e) {
                    await zipReader.close();
                    throw new Error('Incorrect password or unsupported encryption algorithm.');
                }
            }
        }

        await zipReader.close();
        return await zipWriter.close();
    }

    function downloadFile(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
</script>
</body>
</html>
